<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Translation Tool</h1>
        
        <div class="translation-section">
            <div class="input-group">
                <label for="fromLanguage">Translate From:</label>
                <select id="fromLanguage" class="language-select">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh">Chinese</option>
                </select>
            </div>

            <div class="input-group">
                <label for="textInput">Text to Translate:</label>
                <textarea id="textInput" class="text-area" placeholder="Enter text here..."></textarea>
            </div>

            <div class="input-group">
                <label for="toLanguage">Translate To:</label>
                <select id="toLanguage" class="language-select">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh">Chinese</option>
                </select>
            </div>

            <button id="translateBtn" class="translate-button">Translate</button>

            <div class="input-group">
                <label for="outputText">Translation Output:</label>
                <div id="outputText" class="output-box">Translation will appear here...</div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
